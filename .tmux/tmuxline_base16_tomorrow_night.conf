# This tmux statusbar config was created by tmuxline.vim
# on Wed, 15 Oct 2025

# gray #b4b7b4
# black-ish #282a2e
# blue #81a2be
# green #b5bd68

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#b4b7b4,bg=#282a2e"
set -g status-right-style "none"
# editted b/c black is whack
set -g pane-active-border-style "fg=#b5bd68"
set -g status-style "none,bg=#282a2e"
set -g message-style "fg=#b4b7b4,bg=#282a2e"
set -g pane-border-style "fg=#282a2e"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#969896,bg=#282a2e"
# editted to be blue
set -g status-left "#[fg=#282a2e,bg=#b5bd68] #S #[fg=#b5bd68,bg=#282a2e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#282a2e,bg=#282a2e,nobold,nounderscore,noitalics]#[fg=#b4b7b4,bg=#282a2e] %Y-%m-%d  %H:%M #[fg=#b4b7b4,bg=#282a2e,nobold,nounderscore,noitalics]#[fg=#282a2e,bg=#b4b7b4] #h "
setw -g window-status-format "#[fg=#969896,bg=#282a2e] #I #[fg=#969896,bg=#282a2e] #W "
setw -g window-status-current-format "#[fg=#282a2e,bg=#282a2e,nobold,nounderscore,noitalics]#[fg=#b4b7b4,bg=#282a2e] #I #[fg=#b4b7b4,bg=#282a2e] #W #[fg=#282a2e,bg=#282a2e,nobold,nounderscore,noitalics]"
